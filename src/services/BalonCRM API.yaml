            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/customers/:
    get:
      operationId: customers_list
      description: 'Filter: `?status=vip|active|debtor|inactive`, Qidirish: `?search=Ali`'
      summary: Mijozlar ro'yxati
