      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          title: Ism familiya
          maxLength: 200
        phone:
          type: string
          title: Telefon
          maxLength: 20
        address:
          type: string
          title: Manzil
          maxLength: 300
        debt:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
          title: Qarz
        total_spent:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
          readOnly: true
          title: Jami xarid
        status:
