openapi: 3.0.3
info:
  title: BalonCRM API
  version: 1.0.0
  description: |
    BalonCRM - balon va bezak do'koni uchun CRM tizimi REST API.

    ## Autentifikatsiya
    Barcha endpointlar (login bundan mustasno) JWT Bearer token talab qiladi.

    **Token olish:** `POST /api/auth/login/` → `access` tokenini oling.

    **So'rovda ishlatish:** `Authorization: Bearer <access_token>`

    ## Asosiy tushunchalar
    - **Mahsulot** — `cost_price` (tan narx) va `sale_price` (sotuv narxi) ikki alohida narx
    - **Sotuv** — har bir bandda `price` frontentdan keladi (o'zgartirish mumkin)
    - **Harid** — mahsulotni omborga kiritadi, `cost_price` ni yangilaydi
    - **Sof foyda** = Sotuv jami − (tan narx × miqdor)
paths:
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: |-
        Telefon raqami va parol bilan tizimga kirish.

        **Default:** `+998111111111` / `nsdadmin123`

        Qaytarilgan `access` tokenini keyingi so'rovlarda ishlatish uchun:
        `Authorization: Bearer <access>`
      summary: Login — JWT token olish
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
          description: ''
        '400':
          description: Noto'g'ri telefon yoki parol
  /api/auth/logout/:
    post:
      operationId: auth_logout_create
      description: Refresh tokenni bekor qiladi.
      summary: Logout
      tags:
      - auth
      requestBody:
        content:
