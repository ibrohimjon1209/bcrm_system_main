components:
  schemas:
    Category:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          title: Nomi
          maxLength: 100
        product_count:
          type: integer
          readOnly: true
          default: 0
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
      - product_count
    CategoryRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          title: Nomi
          maxLength: 100
      required:
      - name
