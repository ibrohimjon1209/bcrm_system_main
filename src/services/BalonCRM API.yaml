  /api/reports/dashboard/:
    get:
      operationId: reports_dashboard_retrieve
      description: |-
        Asosiy ko'rsatkichlar: daromad, sof foyda, sotuvlar soni, qarz, kunlik grafik, top mahsulotlar, top mijozlar.

        **period parametri:** `today` | `7kun` | `oylik` | `yillik`
      summary: Dashboard statistikasi
      parameters:
      - in: query
        name: period
        schema:
          type: string
          default: today
        description: today | 7kun | oylik | yillik
      tags:
      - reports
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/reports/profit/:
    get:
      operationId: reports_profit_retrieve
      description: |-
        **Sof foyda hisoblash formulasi:**
        ```
        Daromad      = sotuvlar jami
        Tan narx     = sotilgan mahsulotlar cost_price × miqdori
        Sof foyda    = Daromad − Tan narx
        ```
        Oylik ko'rinishda ham qaytariladi.
      summary: Foyda hisoboti
      parameters:
      - in: query
        name: date_from
        schema:
          type: string
          format: date
        description: Boshlanish sanasi (YYYY-MM-DD)
      - in: query
        name: date_to
        schema:
          type: string
          format: date
        description: Tugash sanasi (YYYY-MM-DD)
      tags:
      - reports
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/reports/warehouse/:
    get:
      operationId: reports_warehouse_retrieve
      description: Jami mahsulotlar soni, ombor qiymati va kam qolgan mahsulotlar
        ro'yxati.
      summary: Ombor holati
      tags:
      - reports
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/sales/:
    get:
      operationId: sales_list
      description: |-
        Barcha sotuvlar. Filtrlar:
        - `?date_from=2026-01-01&date_to=2026-12-31` — sana oralig'i
        - `?payment_method=cash` — to'lov turi (cash/card/debt/transfer)
        - `?customer=1` — mijoz bo'yicha
      summary: Sotuvlar ro'yxati
      parameters:
      - in: query
        name: customer
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: payment_method
        schema:
          type: string
          title: To'lov turi
          enum:
          - card
          - cash
          - debt
          - transfer
        description: |-
          * `cash` - Naqd
          * `card` - Karta
          * `debt` - Nasiya
          * `transfer` - O'tkazma
      tags:
      - sales
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedSaleListList'
          description: ''
    post:
      operationId: sales_create
      description: |-
        Sotuv yaratish. Har bir `items` bandida `price` majburiy — frontentdan foydalanuvchi o'zgartirishi mumkin bo'lgan narx.

        **Avtomatik:** stokdan kamaytiradi, mijoz qarzini yangilaydi, Telegram ga xabar yuboradi.
      summary: Yangi sotuv yaratish
      tags:
      - sales
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaleCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SaleCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SaleCreateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sale'
          description: ''
  /api/sales/{id}/:
    get:
      operationId: sales_retrieve
      summary: Sotuv tafsiloti (bandlar bilan)
      parameters:
      - in: path
        name: id
        schema:
